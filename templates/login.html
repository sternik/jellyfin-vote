<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in - Jellyfin Vote</title>
<link rel="stylesheet" href="/css/styles.css">
</head>
<body class="login-body">
<div class="login-wrap">
    <div class="login-brand">
        <span class="brand-mark">J</span>
        <span class="brand-name">Jellyfin Vote</span>
    </div>
    <form class="login-card" onsubmit="event.preventDefault(); login()">
        <h2>Sign in</h2>
        <label class="field">
            <span>Username</span>
            <input type="text" id="usernameInput" placeholder="Username" autocomplete="username" autofocus>
        </label>
        <label class="field">
            <span>Password</span>
            <input type="password" id="passwordInput" placeholder="Password" autocomplete="current-password">
        </label>
        <button type="submit" class="btn-primary">Sign in</button>
        <p class="error" id="errorMsg"></p>
    </form>
    <p class="login-hint">Decide together what to keep — what to remove.</p>
</div>
<script src="/js/login.js"></script>
</body>
</html>
